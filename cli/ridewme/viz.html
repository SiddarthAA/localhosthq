<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ridewme · engine X-ray</title>
<style>
  :root{--bg:#0a0d12;--panel:#111722;--line:#1e2836;--txt:#e6edf3;--dim:#8aa0b6;
        --awake:#22c55e;--notice:#38bdf8;--warn:#f59e0b;--alarm:#ef4444;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.4 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line)}
  header h1{font-size:15px;margin:0;letter-spacing:.5px;font-weight:600}
  header .tag{color:var(--dim);font-size:12px}
  .dot{width:9px;height:9px;border-radius:50%;background:#444;display:inline-block}
  .dot.on{background:var(--awake);box-shadow:0 0 8px var(--awake)}
  button{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;
         padding:6px 12px;cursor:pointer;font-size:12px}
  button:hover{border-color:#2c3a4d}
  main{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;padding:14px;max-width:1400px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .videowrap{position:relative;padding:0;overflow:hidden}
  .videowrap img{width:100%;display:block;border-radius:12px;background:#000}
  .score{display:flex;align-items:baseline;gap:12px}
  .score .n{font-size:56px;font-weight:700;line-height:1}
  .badge{padding:3px 12px;border-radius:999px;font-weight:700;font-size:13px;letter-spacing:.5px}
  .track{height:12px;border-radius:8px;background:#0c121b;margin-top:10px;overflow:hidden;position:relative}
  .track>i{display:block;height:100%;border-radius:8px;transition:width .15s}
  .marks{position:relative;height:0}
  .marks>span{position:absolute;top:-14px;font-size:10px;color:var(--dim)}
  .bars{display:grid;gap:9px;margin-top:6px}
  .bar{display:grid;grid-template-columns:92px 1fr 52px;align-items:center;gap:8px;font-size:12px}
  .bar .lbl{color:var(--dim)}
  .bar .t{height:9px;border-radius:6px;background:#0c121b;overflow:hidden}
  .bar .t>i{display:block;height:100%;background:#3b82f6;transition:width .15s}
  .bar .v{text-align:right;font-variant-numeric:tabular-nums}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim)}
  .chip.on{color:#08111c;font-weight:700}
  .foot{display:flex;gap:16px;color:var(--dim);font-size:12px;margin-top:12px;flex-wrap:wrap}
  .charts{grid-column:1/3;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  canvas{width:100%;height:150px;display:block}
  .chart h3{margin:0 0 6px;font-size:12px;color:var(--dim);font-weight:600}
  .crash{grid-column:1/3;border-color:var(--alarm);display:none;align-items:center;gap:18px}
  .crash.show{display:flex}
  .crash .big{font-size:26px;font-weight:800;color:var(--alarm);letter-spacing:.5px}
  .crash .cd{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums}
  .muted{color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>ridewme · engine X-ray</h1>
  <span class="tag">live drowsiness + crash detection — debug view (video never leaves the edge in production)</span>
  <span style="flex:1"></span>
  <span id="link" class="tag"><span class="dot" id="dot"></span> connecting…</span>
  <button id="sound">🔊 enable sound</button>
</header>

<main>
  <div class="card videowrap"><img id="vid" src="/stream.mjpeg" alt="annotated feed"/></div>

  <div class="card">
    <div class="score">
      <div class="n" id="score">0</div>
      <div class="badge" id="level">AWAKE</div>
    </div>
    <div class="track"><i id="scorebar"></i></div>
    <div class="marks"><span style="left:20%">20</span><span style="left:45%">45</span><span style="left:72%">72</span></div>

    <div class="bars" style="margin-top:20px">
      <div class="bar"><span class="lbl">PERCLOS</span><div class="t"><i id="b_perclos"></i></div><span class="v" id="v_perclos">—</span></div>
      <div class="bar"><span class="lbl">EAR</span><div class="t"><i id="b_ear"></i></div><span class="v" id="v_ear">—</span></div>
      <div class="bar"><span class="lbl">blink dur</span><div class="t"><i id="b_blink"></i></div><span class="v" id="v_blink">—</span></div>
      <div class="bar"><span class="lbl">head nod</span><div class="t"><i id="b_head"></i></div><span class="v" id="v_head">—</span></div>
      <div class="bar"><span class="lbl">yawn</span><div class="t"><i id="b_yawn"></i></div><span class="v" id="v_yawn">—</span></div>
    </div>

    <div class="chips" id="chips"></div>
    <div class="foot">
      <span>agree <b id="agree">0</b></span>
      <span id="fps">— fps</span>
      <span id="duty">full</span>
      <span id="speed">— m/s</span>
      <span id="calib" class="muted"></span>
    </div>
  </div>

  <div class="card crash" id="crash">
    <div class="big">⚠ IMPACT DETECTED</div>
    <div><div class="cd" id="crash_cd">—</div><div class="muted">seconds to dispatch</div></div>
    <div id="crash_meta" class="muted"></div>
  </div>

  <div class="charts">
    <div class="card chart"><h3>fatigue score (0–100)</h3><canvas id="c_score"></canvas></div>
    <div class="card chart"><h3>PERCLOS &amp; EAR</h3><canvas id="c_sig"></canvas></div>
  </div>
</main>

<script>
const COL = {awake:'#22c55e',notice:'#38bdf8',warn:'#f59e0b',alarm:'#ef4444'};
const $ = id => document.getElementById(id);
const clamp = (x,a,b)=>Math.max(a,Math.min(b,x));
function pct(x){return (clamp(x,0,1)*100).toFixed(0)+'%';}

// ── rolling series for the charts ──
const N=180; const S={score:[],perclos:[],ear:[]};
function push(a,v){a.push(v); if(a.length>N)a.shift();}
function draw(cv, series, max, colors){
  const ctx=cv.getContext('2d'); const w=cv.width=cv.clientWidth, h=cv.height=cv.clientHeight;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1e2836'; ctx.lineWidth=1;
  for(let g=0;g<=4;g++){const y=h*g/4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  series.forEach((s,i)=>{
    if(!s.data.length)return;
    ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.beginPath();
    s.data.forEach((v,j)=>{const x=w*j/(N-1), y=h-(clamp(v/max,0,1))*h; j?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke();
  });
}

// ── sound ──
let actx=null, lastLevel='awake', alarmTimer=null;
$('sound').onclick=()=>{actx=new (window.AudioContext||window.webkitAudioContext)(); $('sound').textContent='🔊 sound on'; $('sound').disabled=true;};
function beep(f,d,v){ if(!actx)return; const o=actx.createOscillator(),g=actx.createGain();
  o.frequency.value=f; o.type='sine'; g.gain.value=v; o.connect(g); g.connect(actx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d); o.stop(actx.currentTime+d);}
function levelSound(lvl){
  if(lvl===lastLevel)return; lastLevel=lvl;
  if(alarmTimer){clearInterval(alarmTimer);alarmTimer=null;}
  if(lvl==='notice')beep(440,.18,.08);
  else if(lvl==='warn')beep(600,.28,.13);
  else if(lvl==='alarm'){beep(900,.4,.2); alarmTimer=setInterval(()=>beep(900,.35,.2),700);}
}

// ── live updates ──
function update(m){
  const lvl=m.level||'awake', c=COL[lvl];
  $('score').textContent=Math.round(m.score||0); $('score').style.color=c;
  const b=$('level'); b.textContent=lvl.toUpperCase(); b.style.background=c; b.style.color='#08111c';
  $('scorebar').style.width=pct((m.score||0)/100); $('scorebar').style.background=c;
  const s=m.signals||{};
  const setBar=(id,vid,frac,val)=>{$(id).style.width=pct(frac); $(vid).textContent=val;};
  setBar('b_perclos','v_perclos', s.perclos||0, s.perclos!=null?s.perclos.toFixed(2):'—');
  setBar('b_ear','v_ear', 1-clamp((s.ear||0.3-0.1)/0.2,0,1), s.ear!=null?s.ear.toFixed(2):'—');
  setBar('b_blink','v_blink', clamp(((s.blink_dur_ms||0)-150)/450,0,1), s.blink_dur_ms!=null?Math.round(s.blink_dur_ms)+'ms':'—');
  setBar('b_head','v_head', s.head_nod||0, s.head_nod!=null?s.head_nod.toFixed(2):'—');
  setBar('b_yawn','v_yawn', s.yawn||0, s.yawn!=null?s.yawn.toFixed(2):'—');

  const fired=m.fired||[];
  $('chips').innerHTML=['perclos','blink','head_nod','yawn'].map(k=>{
    const on=fired.includes(k); return `<span class="chip${on?' on':''}" style="${on?`background:${c};border-color:${c}`:''}">${k}</span>`;
  }).join('');
  $('agree').textContent=m.agree_count||0;
  $('fps').textContent=(m.fps||0).toFixed(0)+' fps';
  $('duty').textContent=m.duty||'full';
  $('speed').textContent=(m.speed_mps!=null?m.speed_mps.toFixed(0):'—')+' m/s';
  $('calib').textContent=m.calibrated?'':('calibrating '+Math.round((m.calib_progress||0)*100)+'%');
  $('dot').className='dot on'; $('link').lastChild.textContent=' '+(m.link||'online');

  const cr=m.crash;
  if(cr && cr.status==='unconfirmed'){
    $('crash').classList.add('show');
    $('crash_cd').textContent=Math.max(0,cr.countdown_s||0).toFixed(0);
    $('crash_meta').textContent=`${(cr.severity||'').toUpperCase()} · ${cr.peak_g||0}g`;
  } else { $('crash').classList.remove('show'); }

  levelSound(lvl);
  push(S.score,m.score||0); push(S.perclos,(s.perclos||0)*100); push(S.ear,(s.ear||0)*100);
  draw($('c_score'),[{data:S.score,color:c}],100);
  draw($('c_sig'),[{data:S.perclos,color:'#f59e0b'},{data:S.ear,color:'#38bdf8'}],100);
}

const es=new EventSource('/events');
es.onmessage=e=>{ try{ update(JSON.parse(e.data)); }catch(_){} };
es.onerror=()=>{ $('dot').className='dot'; };
</script>
</body>
</html>
