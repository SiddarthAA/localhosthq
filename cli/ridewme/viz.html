<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ridewme · engine X-ray</title>
<style>
  :root{
    --bg:#08090b; --card:#0f1114; --card2:#0c0e11; --line:#1c2027; --line2:#262b34;
    --txt:#e7e9ee; --muted:#8b93a1; --faint:#5b6472;
    --awake:#34d399; --notice:#38bdf8; --warn:#fbbf24; --alarm:#f43f5e;
    --ax:#f43f5e; --ay:#34d399; --az:#38bdf8;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:14px/1.45 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,Roboto,sans-serif;
       -webkit-font-smoothing:antialiased}
  .top{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line)}
  .brand{font-weight:650;letter-spacing:.2px}
  .brand small{color:var(--faint);font-weight:500;margin-left:8px}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--line2);
        border-radius:999px;color:var(--muted);font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:#3a3f48}
  .dot.on{background:var(--awake);box-shadow:0 0 10px var(--awake)}
  .spacer{flex:1}
  button{background:var(--card);color:var(--txt);border:1px solid var(--line2);border-radius:9px;
         padding:7px 13px;cursor:pointer;font-size:12.5px;transition:border-color .15s}
  button:hover:not(:disabled){border-color:#3a4250}
  button:disabled{color:var(--faint);cursor:default}

  main{max-width:1360px;margin:0 auto;padding:20px;display:grid;gap:16px;
       grid-template-columns:1.55fr 1fr;grid-template-rows:1.35fr 1fr;
       grid-template-areas:"video accel" "metrics gyro";min-height:calc(100vh - 120px)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;
        display:flex;flex-direction:column;min-height:0}
  .card > .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .hd .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .hd .rt{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}

  #videocard{grid-area:video;position:relative;padding:0;overflow:hidden}
  #videocard .hd{position:absolute;top:0;left:0;right:0;z-index:2;padding:14px 16px;margin:0;
     background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,0))}
  #videocard .hd .lbl{color:#cfd6e0}
  #vid{width:100%;height:100%;object-fit:cover;display:block;background:#000}
  .vbadge{position:absolute;left:16px;bottom:16px;z-index:2;display:flex;align-items:center;gap:10px}
  .vbadge .lv{padding:5px 12px;border-radius:999px;font-weight:700;font-size:13px;letter-spacing:.4px}
  .vbadge .sc{font-size:13px;color:#cfd6e0;background:rgba(0,0,0,.45);border:1px solid var(--line2);
     padding:5px 10px;border-radius:999px;font-variant-numeric:tabular-nums}
  .rec{position:absolute;right:16px;top:16px;z-index:2;font-size:11px;color:#cfd6e0;display:flex;gap:6px;align-items:center}
  .rec i{width:8px;height:8px;border-radius:50%;background:var(--alarm);animation:blink 1.4s infinite}
  @keyframes blink{50%{opacity:.25}}

  #metrics{grid-area:metrics}
  .score{display:flex;align-items:baseline;gap:14px}
  .score .n{font-size:44px;font-weight:730;line-height:1;font-variant-numeric:tabular-nums}
  .score .lv{padding:3px 12px;border-radius:999px;font-weight:700;font-size:12.5px}
  .track{height:8px;border-radius:6px;background:#0a0c0f;margin-top:12px;overflow:hidden;position:relative}
  .track>i{display:block;height:100%;border-radius:6px;transition:width .15s,background .15s}
  .bars{display:grid;gap:8px;margin-top:16px}
  .bar{display:grid;grid-template-columns:74px 1fr 54px;align-items:center;gap:10px;font-size:12px}
  .bar .l{color:var(--muted)}
  .bar .t{height:7px;border-radius:5px;background:#0a0c0f;overflow:hidden}
  .bar .t>i{display:block;height:100%;background:#3f4756;border-radius:5px;transition:width .15s,background .15s}
  .bar .v{text-align:right;color:var(--txt);font-variant-numeric:tabular-nums}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .chip{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid var(--line2);color:var(--faint)}
  .chip.on{color:#070b10;font-weight:700}
  .foot{display:flex;gap:18px;color:var(--muted);font-size:12px;margin-top:auto;padding-top:14px;flex-wrap:wrap}
  .foot b{color:var(--txt);font-weight:600}

  #accelcard{grid-area:accel} #gyrocard{grid-area:gyro}
  .sensor .big{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .sensor .unit{font-size:12px;color:var(--faint);margin-left:6px;font-weight:500}
  .chartwrap{flex:1;min-height:70px;margin-top:8px}
  canvas{width:100%;height:100%;display:block}
  .axes{display:flex;gap:16px;margin-top:8px;font-size:12px;font-variant-numeric:tabular-nums}
  .axes span{color:var(--muted)} .axes b{color:var(--txt);font-weight:600}
  .k{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}

  .crash{position:fixed;left:0;right:0;top:0;z-index:20;background:linear-gradient(90deg,#2a0b12,#3a0d16);
     border-bottom:1px solid var(--alarm);display:none;align-items:center;gap:22px;padding:12px 24px}
  .crash.show{display:flex}
  .crash .b{font-weight:800;color:var(--alarm);letter-spacing:.4px}
  .crash .cd{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="crash" id="crash"><span class="b">⚠ IMPACT DETECTED</span><span>dispatch in <span class="cd" id="crash_cd">—</span>s</span><span id="crash_meta" style="color:var(--muted)"></span></div>

<div class="top">
  <span class="brand">ridewme<small>engine X-ray</small></span>
  <span class="pill" id="drv">driver</span>
  <span class="spacer"></span>
  <span class="pill"><span class="dot" id="dot"></span><span id="linktxt">connecting</span></span>
  <button id="sound">🔊 enable sound</button>
</div>

<main>
  <section class="card" id="videocard">
    <div class="hd"><span class="lbl">MediaPipe · processed feed</span></div>
    <div class="rec"><i></i> LIVE</div>
    <img id="vid" src="/stream.mjpeg" alt="feed"/>
    <div class="vbadge"><span class="lv" id="vlevel">AWAKE</span><span class="sc" id="vscore">score 0</span></div>
  </section>

  <section class="card" id="metrics">
    <div class="hd"><span class="lbl">Metrics &amp; scores</span><span class="rt" id="calib"></span></div>
    <div class="score"><span class="n" id="score">0</span><span class="lv" id="level">AWAKE</span></div>
    <div class="track"><i id="scorebar"></i></div>
    <div class="bars">
      <div class="bar"><span class="l">PERCLOS</span><div class="t"><i id="b_perclos"></i></div><span class="v" id="v_perclos">—</span></div>
      <div class="bar"><span class="l">EAR</span><div class="t"><i id="b_ear"></i></div><span class="v" id="v_ear">—</span></div>
      <div class="bar"><span class="l">blink dur</span><div class="t"><i id="b_blink"></i></div><span class="v" id="v_blink">—</span></div>
      <div class="bar"><span class="l">head nod</span><div class="t"><i id="b_head"></i></div><span class="v" id="v_head">—</span></div>
      <div class="bar"><span class="l">yawn</span><div class="t"><i id="b_yawn"></i></div><span class="v" id="v_yawn">—</span></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="foot"><span>agree <b id="agree">0</b></span><span><b id="fps">—</b> fps</span><span id="duty">full</span><span><b id="speed">—</b> m/s</span></div>
  </section>

  <section class="card sensor" id="accelcard">
    <div class="hd"><span class="lbl">Accelerometer</span><span class="rt">m/s²</span></div>
    <div><span class="big" id="a_mag">0.0</span><span class="unit">|a|</span></div>
    <div class="chartwrap"><canvas id="c_accel"></canvas></div>
    <div class="axes"><span><i class="k" style="background:var(--ax)"></i>x <b id="ax">0</b></span><span><i class="k" style="background:var(--ay)"></i>y <b id="ay">0</b></span><span><i class="k" style="background:var(--az)"></i>z <b id="az">0</b></span></div>
  </section>

  <section class="card sensor" id="gyrocard">
    <div class="hd"><span class="lbl">Gyroscope</span><span class="rt">°/s</span></div>
    <div><span class="big" id="g_mag">0.0</span><span class="unit">|ω|</span></div>
    <div class="chartwrap"><canvas id="c_gyro"></canvas></div>
    <div class="axes"><span><i class="k" style="background:var(--ax)"></i>α <b id="ga">0</b></span><span><i class="k" style="background:var(--ay)"></i>β <b id="gb">0</b></span><span><i class="k" style="background:var(--az)"></i>γ <b id="gg">0</b></span></div>
  </section>
</main>

<script>
const COL={awake:'#34d399',notice:'#38bdf8',warn:'#fbbf24',alarm:'#f43f5e'};
const $=id=>document.getElementById(id), clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const AXC='#f43f5e', AYC='#34d399', AZC='#38bdf8';   // resolved axis colors for canvas
const N=160;
const accel={x:[],y:[],z:[]}, gyro={a:[],b:[],g:[]};
function push(a,v){a.push(v); if(a.length>N)a.shift();}

// centered multi-line chart (0 in the middle, ±range)
function drawC(cv, series, range){
  const dpr=devicePixelRatio||1, w=cv.clientWidth, h=cv.clientHeight;
  cv.width=w*dpr; cv.height=h*dpr; const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#171b22'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
  series.forEach(s=>{ if(!s.data.length)return;
    ctx.strokeStyle=s.color; ctx.lineWidth=1.8; ctx.beginPath();
    s.data.forEach((v,i)=>{const x=w*i/(N-1), y=h/2 - clamp(v/range,-1,1)*(h/2-3); i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.stroke(); });
}

// sound
let actx=null,last='awake',timer=null;
$('sound').onclick=()=>{actx=new(window.AudioContext||window.webkitAudioContext)();$('sound').textContent='🔊 sound on';$('sound').disabled=true;};
function beep(f,d,v){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(1e-4,actx.currentTime+d);o.stop(actx.currentTime+d);}
function snd(l){if(l===last)return;last=l;if(timer){clearInterval(timer);timer=null;}
  if(l==='notice')beep(440,.18,.08);else if(l==='warn')beep(600,.28,.13);
  else if(l==='alarm'){beep(900,.4,.2);timer=setInterval(()=>beep(900,.35,.2),700);}}

function mag(o,k){return o?Math.hypot(o[k[0]]||0,o[k[1]]||0,o[k[2]]||0):0;}

function update(m){
  const lvl=m.level||'awake',c=COL[lvl];
  $('drv').textContent=m.driver||'driver';
  $('score').textContent=Math.round(m.score||0); $('score').style.color=c;
  $('vscore').textContent='score '+Math.round(m.score||0);
  [['level',lvl.toUpperCase()],['vlevel',lvl.toUpperCase()]].forEach(([id,t])=>{const e=$(id);e.textContent=t;e.style.background=c;e.style.color='#07110d';});
  $('scorebar').style.width=clamp((m.score||0)/100,0,1)*100+'%'; $('scorebar').style.background=c;
  const s=m.signals||{}, bar=(b,vv,frac,val)=>{const e=$(b);e.style.width=clamp(frac,0,1)*100+'%';e.style.background=frac>0.5?c:'#3f4756';$(vv).textContent=val;};
  bar('b_perclos','v_perclos',s.perclos||0,s.perclos!=null?s.perclos.toFixed(2):'—');
  bar('b_ear','v_ear',s.ear!=null?clamp((0.30-s.ear)/0.20,0,1):0,s.ear!=null?s.ear.toFixed(2):'—');
  bar('b_blink','v_blink',clamp(((s.blink_dur_ms||0)-150)/450,0,1),s.blink_dur_ms!=null?Math.round(s.blink_dur_ms)+'ms':'—');
  bar('b_head','v_head',s.head_nod||0,s.head_nod!=null?s.head_nod.toFixed(2):'—');
  bar('b_yawn','v_yawn',s.yawn||0,s.yawn!=null?s.yawn.toFixed(2):'—');
  const fired=m.fired||[];
  $('chips').innerHTML=['perclos','blink','head_nod','yawn'].map(k=>{const on=fired.includes(k);return `<span class="chip${on?' on':''}" style="${on?`background:${c};border-color:${c}`:''}">${k}</span>`;}).join('');
  $('agree').textContent=m.agree_count||0; $('fps').textContent=(m.fps||0).toFixed(0);
  $('duty').textContent=m.duty||'full'; $('speed').textContent=m.speed_mps!=null?m.speed_mps.toFixed(0):'—';
  $('calib').textContent=m.calibrated?'tracking active':('calibrating '+Math.round((m.calib_progress||0)*100)+'%');
  $('dot').className='dot on'; $('linktxt').textContent=m.link||'online';

  // accelerometer
  const a=m.accel;
  if(a){push(accel.x,a.x||0);push(accel.y,a.y||0);push(accel.z,a.z||0);
    $('ax').textContent=(a.x||0).toFixed(1);$('ay').textContent=(a.y||0).toFixed(1);$('az').textContent=(a.z||0).toFixed(1);
    $('a_mag').textContent=mag(a,['x','y','z']).toFixed(1);}
  drawC($('c_accel'),[{data:accel.x,color:AXC},{data:accel.y,color:AYC},{data:accel.z,color:AZC}],20);
  // gyroscope
  const g=m.gyro;
  if(g){push(gyro.a,g.alpha||0);push(gyro.b,g.beta||0);push(gyro.g,g.gamma||0);
    $('ga').textContent=(g.alpha||0).toFixed(0);$('gb').textContent=(g.beta||0).toFixed(0);$('gg').textContent=(g.gamma||0).toFixed(0);
    $('g_mag').textContent=mag(g,['alpha','beta','gamma']).toFixed(0);}
  drawC($('c_gyro'),[{data:gyro.a,color:AXC},{data:gyro.b,color:AYC},{data:gyro.g,color:AZC}],300);

  const cr=m.crash;
  if(cr&&cr.status==='unconfirmed'){$('crash').classList.add('show');$('crash_cd').textContent=Math.max(0,cr.countdown_s||0).toFixed(0);$('crash_meta').textContent=(cr.severity||'').toUpperCase()+' · '+(cr.peak_g||0)+'g';}
  else $('crash').classList.remove('show');
  snd(lvl);
}
const es=new EventSource('/events');
es.onmessage=e=>{try{update(JSON.parse(e.data));}catch(_){}};
es.onerror=()=>{$('dot').className='dot';$('linktxt').textContent='offline';};
</script>
</body>
</html>
