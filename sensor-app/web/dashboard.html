<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sensor-app · dashboard</title>
<link rel="stylesheet" href="/ui.css" />
<style>
  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 18px 20px 48px; }
  header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .brand { font-size: 15px; font-weight: 650; }
  .brand span { color: hsl(var(--muted)); font-weight: 500; }
  header .sp { margin-left: auto; }
  header .status { display: flex; gap: 14px; font-size: 11.5px; color: hsl(var(--muted)); text-transform: uppercase; letter-spacing: .4px; }
  header .status span { display: inline-flex; align-items: center; gap: 6px; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: hsl(var(--muted)); margin: 20px 2px 10px; font-weight: 600; }
  .layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; align-items: start; }
  .feedcard { overflow: hidden; }
  .feedcard .cap { font-size: 12px; color: hsl(var(--muted)); padding: 9px 13px; border-bottom: 1px solid hsl(var(--border)); }
  .feedcard .cap b { color: hsl(var(--foreground)); font-weight: 600; }
  .feedcard img { display: block; width: 100%; background: #000; aspect-ratio: 4 / 3; object-fit: contain; }
  .cells { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .chartbox { padding: 11px 13px; }
  .chartbox .hd { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .chartbox .hd .t { font-size: 12px; color: hsl(var(--foreground)); font-weight: 600; }
  .chartbox .hd .lg { font-size: 11px; color: hsl(var(--muted)); display: inline-flex; align-items: center; gap: 5px; }
  .chartbox .hd .lg i { width: 9px; height: 3px; border-radius: 2px; display: inline-block; }
  canvas.chart { width: 100%; height: 118px; display: block; }
  .rightcol { display: grid; gap: 10px; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } .cells { grid-template-columns: 1fr 1fr 1fr; } }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">sensor-app <span>· dashboard</span></div>
      <div class="sp"></div>
      <div class="status">
        <span><i id="dot_sensors" class="dot"></i> sensors</span>
        <span><i id="dot_cv" class="dot"></i> feed</span>
        <span>source <b id="server" style="color:hsl(var(--foreground))">shawarma</b></span>
      </div>
    </header>

    <div class="layout">
      <div>
        <div class="card feedcard">
          <div class="cap"><b>Live feed</b> — from shawarma</div>
          <img id="feed" alt="live feed" />
        </div>
        <h2 style="margin-top:16px">Feed metrics</h2>
        <div class="cells">
          <div class="stat card"><div class="k">brightness</div><div class="v mono" id="m_brightness">—</div></div>
          <div class="stat card"><div class="k">motion</div><div class="v mono" id="m_motion">—</div></div>
          <div class="stat card"><div class="k">resolution</div><div class="v mono" id="m_res">—</div></div>
        </div>
      </div>

      <div class="rightcol">
        <div class="card chartbox">
          <div class="hd"><span class="t">Gyroscope (°/s)</span>
            <span class="lg"><i style="background:#22d3ee"></i>α</span>
            <span class="lg"><i style="background:#a78bfa"></i>β</span>
            <span class="lg"><i style="background:#f472b6"></i>γ</span></div>
          <canvas id="c_gyro" class="chart"></canvas>
        </div>
        <div class="card chartbox">
          <div class="hd"><span class="t">Accelerometer +g (m/s²)</span>
            <span class="lg"><i style="background:#22d3ee"></i>x</span>
            <span class="lg"><i style="background:#a78bfa"></i>y</span>
            <span class="lg"><i style="background:#f472b6"></i>z</span></div>
          <canvas id="c_accel" class="chart"></canvas>
        </div>
        <div class="cells" style="grid-template-columns:1fr 1fr 1fr">
          <div class="stat card"><div class="k">compass °</div><div class="v mono" id="r_compass">—</div></div>
          <div class="stat card"><div class="k">orient α,β,γ</div><div class="v mono" id="r_orient">—</div></div>
          <div class="stat card"><div class="k">gps</div><div class="v mono" id="r_gps">—</div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>
</html>
