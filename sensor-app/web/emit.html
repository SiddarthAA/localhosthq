<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>RidewMe · emitter</title>
<link rel="stylesheet" href="/ui.css" />
<style>
  .wrap { position: relative; z-index: 1; max-width: 460px; margin: 0 auto; padding: 20px 16px 40px; }
  .top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .brand { font-size: 16px; font-weight: 600; letter-spacing: 1px; line-height: 1.05; }
  .brand .accent { color: hsl(var(--primary)); text-shadow: 0 0 12px hsl(var(--primary) / .6); }
  .brand .sub { display: block; font-size: 9px; font-weight: 600; color: hsl(var(--muted)); letter-spacing: 3.5px; text-transform: uppercase; margin-top: 4px; }
  #toggle { width: 100%; }
  .videocard { margin-top: 16px; position: relative; }
  video { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: #000; display: block; border-radius: calc(var(--radius) - 1px); }
  .videocard .cap { position: absolute; top: 9px; left: 9px; display: flex; gap: 8px; align-items: center; z-index: 3;
                    font-size: 10.5px; color: hsl(var(--foreground)); background: hsl(var(--background) / .5);
                    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
                    padding: 3px 8px; border-radius: 2px; border: 1px solid hsl(var(--border)); }
  .videocard .cap .lbl { color: hsl(var(--primary)); text-transform: uppercase; letter-spacing: 1.5px; font-size: 9px; font-weight: 600; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .charts { margin-top: 10px; display: grid; gap: 10px; }
  .chartbox { padding: 11px 13px; }
  .chartbox .hd { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .chartbox .hd .t { font-size: 10px; font-weight: 600; color: hsl(var(--foreground)); text-transform: uppercase; letter-spacing: 1.5px; }
  .chartbox .hd .lg { margin-left: auto; font-size: 10px; color: hsl(var(--muted)); display: inline-flex; gap: 10px; }
  .chartbox .hd .lg i { display: inline-flex; align-items: center; gap: 4px; font-style: normal; }
  .chartbox .hd .lg b { width: 10px; height: 2px; border-radius: 1px; display: inline-block; }
  canvas.chart { width: 100%; height: 90px; display: block; }
  pre#log { margin: 12px 0 0; padding: 9px 11px; max-height: 84px; overflow: auto;
            font-size: 10px; line-height: 1.55; color: hsl(var(--muted)); white-space: pre-wrap; }
  pre#log:empty { display: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">Ride<span class="accent">w</span>Me<span class="sub">Emitter</span></div>
      <span id="badge" class="badge"><i class="dot"></i><span id="badgeText">idle</span></span>
    </div>

    <button id="toggle" class="btn btn-success btn-lg">Start streaming</button>

    <div class="card videocard hud">
      <div class="cap"><span class="lbl">Raw</span><span class="mono" id="m_cam">—</span></div>
      <video id="cam" playsinline muted></video>
    </div>

    <div class="grid3">
      <div class="stat card"><div class="k">fps</div><div class="v mono" id="m_fps">0</div></div>
      <div class="stat card"><div class="k">sensor pkts</div><div class="v mono" id="m_pkts">0</div></div>
      <div class="stat card"><div class="k">lat, lon</div><div class="v mono" id="m_gps" style="font-size:11px">—</div></div>
    </div>

    <div class="charts">
      <div class="card chartbox hud">
        <div class="hd"><span class="t">Accelerometer</span>
          <span class="lg"><i><b style="background:#22d3ee"></b>x</i><i><b style="background:#a78bfa"></b>y</i><i><b style="background:#f472b6"></b>z</i></span></div>
        <canvas id="c_accel" class="chart"></canvas>
      </div>
      <div class="card chartbox hud">
        <div class="hd"><span class="t">Gyroscope</span>
          <span class="lg"><i><b style="background:#22d3ee"></b>α</i><i><b style="background:#a78bfa"></b>β</i><i><b style="background:#f472b6"></b>γ</i></span></div>
        <canvas id="c_gyro" class="chart"></canvas>
      </div>
    </div>

    <pre id="log" class="card"></pre>
  </div>

  <canvas id="work" style="display:none"></canvas>
  <script src="/app.js"></script>
</body>
</html>
